<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Cross Service Link development page" />
    <title>Development</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="src/main.ts" defer></script>
    <script type="module" defer>
      const onLinkClick = (link) => console.log("link clicked", link);
      const onLearnMoreClick = () => console.log("learn more click");
      const onNeverShowClick = () => console.log("never show click");
      const events = { onLinkClick, onLearnMoreClick, onNeverShowClick };
      const widget = new window.CrossServiceLink({ target: "#app", events });
      widget.mount();
    </script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        color: #ffffff;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body id="app">
    <pre>development-page</pre>
  </body>
</html>
