<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo</title>
    <script type="module">
      import { CrossServiceLink } from "/src/main.ts";
      const onLinkClick = (link) => console.log("link clicked", link);
      const onLearnMoreClick = () => console.log("learn more click");
      const onNeverShowClick = () => console.log("never show click");
      const events = { onLinkClick, onLearnMoreClick, onNeverShowClick };
      const widget = new CrossServiceLink({ target: "#app", events });
      widget.mount();
    </script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        color: #ffffff;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body id="app">
    <pre>demo-page</pre>
  </body>
</html>
