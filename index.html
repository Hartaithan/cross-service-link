<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="src/main.ts" defer></script>
    <script type="module" defer>
      const events = {
        onLinkClick: (link) => console.log("link clicked", link),
        onLearnMoreClick: () => console.log("learn more click"),
        onNeverShowClick: () => console.log("never show click"),
      };
      window.CrossServiceLink.ready.then(() => {
        const widget = new window.CrossServiceLink({ target: "#app", events });
        widget.mount();
      });
    </script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
      }
      body {
        color: #ffffff;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body id="app">
    <pre>demo-page</pre>
  </body>
</html>
