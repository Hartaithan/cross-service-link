<div class="csl-widget">
  <div class="csl-widget-header">
    <span class="csl-widget-label">You might like</span>
    <button id="csl-close" class="csl-widget-close" aria-label="Dismiss">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="15"
        height="15"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  </div>
  <div id="csl-items" class="csl-widget-items"></div>
  <div class="csl-widget-divider"></div>
  <div class="csl-widget-footer">
    <button id="csl-view" class="csl-widget-explore">Explore all</button>
    <button id="csl-never-show" class="csl-widget-never">
      Don't show again
    </button>
  </div>
</div>
