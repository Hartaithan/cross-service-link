<div
  class="csl-carousel-slide"
  data-slide-id="{{id}}"
  style="--image-background: {{image_background}};"
>
  <img class="csl-carousel-slide-image" src="{{image_url}}" alt="{{title}}" />
  <div class="csl-carousel-slide-content">
    <h3 class="csl-carousel-slide-title">{{title}}</h3>
    <p class="csl-carousel-slide-description">{{description}}</p>
    <a class="csl-carousel-slide-link" href="{{link}}" target="_blank">
      Visit {{title}}
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M15 3h6v6" />
        <path d="M10 14 21 3" />
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
      </svg>
    </a>
  </div>
</div>
